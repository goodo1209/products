<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
        <h1>Lotto Number Generator</h1>
        <div class="number-display">
            <lotto-numbers></lotto-numbers>
        </div>
        <button id="generate-btn">Generate Numbers</button>
        <div class="history">
            <h2>History</h2>
            <ul id="history-list"></ul>
        </div>
        <div class="contact-form">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/your-form-id" method="POST">
                <div class="form-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" name="email" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required placeholder="How can we cooperate?"></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
